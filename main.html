<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title and logo -->
    <title>Github Issues tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins&display=swap"
        rel="stylesheet">

    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <!-- Navbar -->
    <header>
        <nav class="navbar bg-base-100 md:px-20 shadow-sm flex md:flex-row flex-col justify-center gap-2">
            <div class="navbar-star">
                <a class="flex items-center justify-center normal-case gap-1 font-semibold text-2xl" href="">
                    <img src="./assets/github-logo.png" alt="GitHub Logo" class="h-10 w-10">
                    GitHub Issues Tracker
                </a>
            </div>
            <div class="navbar-end md:justify-end justify-center">
                <div class="flex gap-2">
                    <label class="input input-bordered flex items-center gap-2">
                        <i class="fa-brands fa-sistrix text-gray-500"></i>
                        <input id="search-input" type="search" class="grow" placeholder="Search Issues..." />
                    </label>
                    <button id="new-issue-btn" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i>
                        New Issue</button>
                </div>
            </div>
        </nav>
    </header>
    <!--Filter buttons -->
    <section class="w-8/12 mx-auto bg-white mt-10 rounded-md shadow-sm">
        <div id="filter-buttons" class="flex gap-4 p-4 md:justify-start justify-center ">
            <button class="btn btn-outline min-w-20 border-gray-300 text-gray-600">All</button>
            <button class="btn btn-outline min-w-20 border-gray-300 text-gray-600">Open</button>
            <button class="btn btn-outline min-w-20 border-gray-300 text-gray-600">Closed</button>
        </div>
    </section>
    <!-- Issues Header -->
    <section
        class="w-8/12 mx-auto bg-white mt-3 rounded-md shadow-sm md:p-6 p-3 flex flex-col md:flex-row items-center justify-between border-b-gray-400 border-b-2">
        <div class="flex gap-2 flex-col md:flex-row items-center">
            <div class="flex items-center justify-center bg-[#ECE4FF] p-2 border-blue-300 rounded-full h-12 w-12 ">
                <img class="h-7 w-7" src="./assets/Aperture.png" alt="">
            </div>
            <div class="flex flex-col items-center md:items-start">
                <h1 class="text-xl font-semibold">50 Issues</h1>
                <p class="text-sm text-gray-500 text-wrap">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-6 items-center">
            <p class="flex gap-1 items-center"><i class="fa-solid fa-circle text-green-700 text-sm"></i>Open</p>
            <p class="flex gap-1 items-center"><i class="fa-solid fa-circle text-violet-600 text-sm"></i>Closed</p>
        </div>
    </section>




</body>
<!-- scripts -->
<script src="./scripts/main.js"></script>

</html>
